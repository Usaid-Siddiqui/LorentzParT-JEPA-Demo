# Configuration for MAE (Masked Autoencoder) pretraining — the baseline approach.
#
# Uses the existing LorentzParT with mask=True: the model reconstructs the raw
# 4-vector (pT, η, φ, E) of one randomly masked particle per jet.
# ConservationLoss handles the periodicity of φ via cosine similarity.

model:
  name: lorentz_part
  max_num_particles: 128
  num_particle_features: 4
  num_classes: 10
  embed_dim: 128
  num_heads: 8
  num_layers: 8
  num_cls_layers: 2
  num_mlp_layers: 0
  hidden_dim: 256
  hidden_mv_channels: 8
  in_s_channels: null
  out_s_channels: null
  hidden_s_channels: 16
  dropout: 0.1
  expansion_factor: 4
  pair_embed_dims: [64, 64, 64]
  mask: true
  weights: null

train:
  batch_size: 1000
  criterion:
    name: conservation_loss
  optimizer:
    name: radam
    lr: 0.001
    betas: [0.95, 0.999]
  optimizer_wrapper:
    name: lookahead
    la_steps: 6
    la_alpha: 0.5
  scheduler:
    name: exponential_lr
    gamma: 0.736
  callbacks:
    - name: early_stopping
      patience: 7
      min_delta: 0.0001
  num_epochs: 20
  start_epoch: 0
  logging_dir: ./logs
  logging_steps: 50
  progress_bar: true
  save_best: true
  save_ckpt: true
  save_fig: true
  num_workers: 8
  pin_memory: true
